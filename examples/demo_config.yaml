# ═══════════════════════════════════════════════════
# demo_config.yaml — 示例卖家 / 买家数据（首启试用用）
#
# 这些不是用户的真实数据，而是供首次使用者一键加载试用的示例实体。
# GUI 在 sellers/buyers 为空时显示「加载示例数据试用」按钮，点击后
# 经 ConfigService.merge_demo 增量合并到用户 config.yaml（不覆盖同名实体）。
#
# 模板 config.yaml 本身保持 sellers: {} / buyers: {} 空白，符合
# 「面向 N 个外贸从业者、无固定默认买卖家」的产品方向。
# ═══════════════════════════════════════════════════

